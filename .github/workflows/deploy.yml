name: Build & Deploy to EC2

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/npixie-master-api

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Strip obsolete version field from docker-compose.yml
        run: sed -i '/^version:/d' docker-compose.yml

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/npixie"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e

            APP_DIR="/home/${{ secrets.EC2_USER }}/npixie"
            cd "$APP_DIR"

            echo "==> [0/6] Write .env file from secrets"
            cat > "$APP_DIR/.env" << 'EOF'
            QDRANT_HOST=qdrant
            QDRANT_PORT=6333
            QDRANT_COLLECTION=npixie_lore
            SUPABASE_URL=${{ vars.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            EMBEDDING_MODEL=${{ vars.EMBEDDING_MODEL }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GROQ_MODEL=${{ vars.GROQ_MODEL }}
            DEFAULT_NPC=nara
            CHUNK_SIZE=500
            CHUNK_OVERLAP=50
            TOP_K=10
            RERANKER_MODEL=${{ vars.RERANKER_MODEL }}
            RERANKER_TOP_K=${{ vars.RERANKER_TOP_K }}
            HF_TOKEN=${{ secrets.HF_TOKEN }}
            HF_REPO_ID=${{ vars.HF_REPO_ID }}
            EOF
            chmod 600 "$APP_DIR/.env"
            echo ".env written."

            echo "==> [0.5/6] Ensure python3 and pip available"
            sudo apt-get install -y python3 python3-pip -q || true

            echo "==> [1/6] Check and configure swap"
            if ! swapon --show | grep -q '/swapfile'; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            echo "==> Install Docker Compose v2 plugin if not available"
            if ! docker compose version &>/dev/null; then
              DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
              mkdir -p "$DOCKER_CONFIG/cli-plugins"
              curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
                -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
              chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
            fi

            echo "==> [2/6] Log in to DockerHub"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "==> [3/6] Download model from HuggingFace if not exists"
            mkdir -p "$APP_DIR/specxel/models"
            if [ ! -f "$APP_DIR/specxel/models/best_model.pth" ]; then
              pip3 install -q huggingface_hub
              HF_TOKEN="${{ secrets.HF_TOKEN }}" HF_REPO_ID="${{ vars.HF_REPO_ID }}" python3 -c "
              import os, shutil
              from huggingface_hub import hf_hub_download
              path = hf_hub_download(repo_id=os.environ['HF_REPO_ID'], filename='best_model.pth', token=os.environ['HF_TOKEN'], local_dir='/tmp/hf_model')
              shutil.copy(path, os.environ['MODEL_DEST'])
              print('Model downloaded.')
              " MODEL_DEST="$APP_DIR/specxel/models/best_model.pth"
            else
              echo "Model already exists, skipping download."
            fi

            echo "==> [4/6] Pull latest image"
            docker pull ${{ env.DOCKERHUB_IMAGE }}:latest

            echo "==> [5/6] Stop and remove existing containers"
            docker compose down --remove-orphans || true

            echo "==> [6/6] Start containers with new image"
            export API_IMAGE="${{ env.DOCKERHUB_IMAGE }}:latest"
            docker compose up -d --no-build

            echo "==> Pruning unused images"
            docker image prune -f

            echo "Deploy complete."
            docker compose ps

  healthcheck:
    name: Post-deploy Healthcheck
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for service to be ready
        run: sleep 30

      - name: Check API health endpoint
        run: |
          echo "Checking API at http://${{ secrets.EC2_HOST }}:8000/health"

          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              http://${{ secrets.EC2_HOST }}:8000/health || echo "000")

            echo "Attempt $i: HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "API is healthy."
              exit 0
            fi

            sleep 10
          done

          echo "API did not respond after 5 attempts."
          exit 1