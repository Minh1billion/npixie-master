services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: npixie-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: ${API_IMAGE:-npixie-api-local}
    container_name: npixie-api
    ports:
      - "8000:8000"
    volumes:
      - ./specxel/models:/app/specxel/models
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data: